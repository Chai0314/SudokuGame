name: Deploy Sudoku Game to GitHub Pages

# 触发条件：推送到 master 分支，或手动触发
on:
  push:
    branches: [ master ]
  workflow_dispatch:

# 权限配置（必须，否则部署失败）
permissions:
  contents: read
  pages: write
  id-token: write

# 部署任务
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build # 打包生成 dist 文件夹

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # 部署 dist 目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4